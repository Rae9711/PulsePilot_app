version: '3.9'

services:
  # PostgreSQL Database only
  postgres:
    image: postgres:15-alpine
    container_name: fitforecast-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: fitforecast
      POSTGRES_USER: fitforecast
      POSTGRES_PASSWORD: fitforecast
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fitforecast"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_dev_data:
    driver: local
